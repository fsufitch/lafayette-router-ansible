[Interface]
PrivateKey = AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAEE=
Address = 10.0.0.1/32

# DNS must be set to a public resolver to avoid leaking the VPN peer's private DNS server.
DNS = 1.1.1.1  

# The container runtime writes /etc/resolv.conf directly, bypassing openresolv's
# signature management. Without this PreUp, wg-quick's "resolvconf -a wg0" fails
# with "signature mismatch" and tears down the interface.
PreUp = mkdir -p /etc/resolvconf/resolv.conf.d && cp /etc/resolv.conf /etc/resolvconf/resolv.conf.d/base 2>/dev/null; resolvconf -u

# remote settings for VPN peer
[Peer]
PublicKey = BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=
Endpoint = 1.2.3.4:51820

# AllowedIPs must exclude the VPN endpoint IP and private ranges (10.0.0.0/8,
# 192.168.0.0/16, etc.) to avoid asymmetric routing that breaks the web UI.
# Use negative_cidr.py to generate the correct CIDR complement, e.g.:
#   python3 negative_cidr.py 0.0.0.0/0 1.2.3.4/32 10.0.0.0/8 192.168.0.0/16
AllowedIPs = 0.0.0.0/1,128.0.0.0/1
